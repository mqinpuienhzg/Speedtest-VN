<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedtest - Real World</title>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 320px; border: 1px solid #334155; }
        h2 { margin-top: 0; color: #38bdf8; font-size: 1.4rem; letter-spacing: 1px; }
        
        /* Box Tốc Độ */
        .speed-box { margin: 20px 0; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        #speed-mbps { font-size: 4.5rem; font-weight: bold; line-height: 1; color: #22c55e; text-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .unit-main { font-size: 1.2rem; color: #94a3b8; font-weight: bold; margin-bottom: 10px; display: block; }
        
        #speed-mbs { font-size: 1.5rem; color: #00f2fe; font-weight: bold; }
        .unit-sub { font-size: 0.9rem; color: #94a3b8; }
        
        #status { font-size: 0.75rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; background: rgba(56, 189, 248, 0.1); padding: 5px; border-radius: 5px; }
        
        /* Lưới Ping & Jitter */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-val { font-size: 1.6rem; font-weight: bold; }
        #ping-val { color: #f43f5e; } 
        #jitter-val { color: #f59e0b; } 
        .ms { font-size: 0.8rem; color: #94a3b8; }

        /* Nút Bấm */
        button { border: none; padding: 18px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px; }
        .btn-start { background: #38bdf8; color: #0f172a; }
        .btn-stop { background: #ff4757; color: #ffffff; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="container">
    <h2>REAL-WORLD SPEED</h2>
    <div id="status">SẴN SÀNG</div>
    
    <div class="speed-box">
        <span class="unit-main">TỐC ĐỘ MẠNG</span>
        <div id="speed-mbps">0</div>
        <span class="unit-main">Mbps</span>
        
        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155;">
            <span style="font-size: 0.8rem; color: #94a3b8; text-transform: uppercase;">Tốc độ tải file thực tế:</span><br>
            <span id="speed-mbs">0.00</span> <span class="unit-sub">MB/s</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Ping</div>
            <div class="stat-val"><span id="ping-val">--</span> <span class="ms">ms</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Jitter</div>
            <div class="stat-val"><span id="jitter-val">--</span> <span class="ms">ms</span></div>
        </div>
    </div>

    <button id="btn" class="btn-start" onclick="toggleTest()">BẮT ĐẦU ĐO (1 LUỒNG)</button>
</div>

<script>
    let isTesting = false;
    let xhr = null;
    let totalBytes = 0;
    let lastTotalBytes = 0;
    let lastTime = 0;
    let speedHistory = []; 

    let lastPing = null;
    let jitterTotal = 0;
    let jitterCount = 0;

    function toggleTest() {
        const btn = document.getElementById('btn');
        const statusEl = document.getElementById('status');

        if (isTesting) {
            // DỪNG ĐO
            isTesting = false;
            if (xhr) xhr.abort();
            
            btn.className = "btn-start";
            btn.innerText = "BẮT ĐẦU ĐO (1 LUỒNG)";
            statusEl.innerText = "Đã ngắt kết nối";
            document.getElementById('speed-mbps').style.color = "#94a3b8";
            document.getElementById('speed-mbs').style.color = "#94a3b8";
            return;
        }

        // BẮT ĐẦU ĐO
        isTesting = true;
        totalBytes = 0; lastTotalBytes = 0; speedHistory = [];
        lastPing = null; jitterTotal = 0; jitterCount = 0;

        btn.className = "btn-stop";
        btn.innerText = "DỪNG ĐO";
        document.getElementById('speed-mbps').style.color = "#22c55e";
        document.getElementById('speed-mbs').style.color = "#00f2fe";
        document.getElementById('speed-mbps').innerText = "0";
        document.getElementById('speed-mbs').innerText = "0.00";
        document.getElementById('ping-val').innerText = "--";
        document.getElementById('jitter-val').innerText = "--";
        statusEl.innerText = "ĐANG ĐO TỐC ĐỘ THỰC TẾ...";

        lastTime = Date.now();
        startSingleThread();
        requestAnimationFrame(updateUI);
        runPingLoop();
    }

    // Mở đúng 1 luồng kết nối (Mô phỏng tải 1 file thực tế)
    function startSingleThread() {
        if (!isTesting) return;
        xhr = new XMLHttpRequest();
        
        // Tải file 50MB
        const testUrl = "https://speed.cloudflare.com/__down?bytes=50000000&r=" + Math.random();
        xhr.open('GET', testUrl, true);
        
        let lastLoaded = 0;
        xhr.onprogress = function(event) {
            if (!isTesting) return;
            const chunk = event.loaded - lastLoaded;
            totalBytes += chunk; 
            lastLoaded = event.loaded;
        };
        
        // Tải xong tự động nối tiếp
        xhr.onload = function() { if (isTesting) startSingleThread(); };
        xhr.onerror = function() { if (isTesting) setTimeout(startSingleThread, 1000); };
        xhr.send();
    }

    // Tính toán hiển thị
    function updateUI() {
        if (!isTesting) return;
        const now = Date.now();
        const deltaT = (now - lastTime) / 1000;

        // Cập nhật mỗi 0.25 giây
        if (deltaT >= 0.25) {
            const deltaBytes = totalBytes - lastTotalBytes;
            
            // Tính Megabyte/giây (MB/s) - Tốc độ hiển thị khi tải file
            const currentMBs = (deltaBytes / (deltaT * 1024 * 1024));
            
            // Tính Megabit/giây (Mbps) - Tốc độ chuẩn nhà mạng
            const currentMbps = currentMBs * 8;
            
            // Làm mượt số liệu
            speedHistory.push({ mbps: currentMbps, mbs: currentMBs });
            if (speedHistory.length > 4) speedHistory.shift();
            
            const avgMbps = speedHistory.reduce((a, b) => a + b.mbps, 0) / speedHistory.length;
            const avgMBs = speedHistory.reduce((a, b) => a + b.mbs, 0) / speedHistory.length;
            
            // Hiển thị ra màn hình
            document.getElementById('speed-mbps').innerText = avgMbps.toFixed(0);
            document.getElementById('speed-mbs').innerText = avgMBs.toFixed(2);
            
            lastTotalBytes = totalBytes;
            lastTime = now;
        }
        requestAnimationFrame(updateUI);
    }

    // Luồng đo Ping & Jitter
    async function runPingLoop() {
        while (isTesting) {
            const pStart = Date.now();
            try {
                await fetch('https://cloudflare.com/cdn-cgi/trace?r=' + Math.random(), { cache: 'no-store' });
                const ping = Date.now() - pStart;
                document.getElementById('ping-val').innerText = ping;

                if (lastPing !== null) {
                    const jitter = Math.abs(ping - lastPing);
                    jitterTotal += jitter;
                    jitterCount++;
                    document.getElementById('jitter-val').innerText = (jitterTotal / jitterCount).toFixed(0);
                }
                lastPing = ping;
            } catch (e) {}
            await new Promise(r => setTimeout(r, 1000)); // Đo ping mỗi 1 giây
        }
    }
</script>
</body>
</html>
