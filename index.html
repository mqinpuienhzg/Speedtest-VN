<script>
    // --- Khởi tạo Bản đồ (GIỮ NGUYÊN) ---
    const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([10.762622, 106.660172], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 16);
            const myIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3233/3233519.png', iconSize: [32, 32], iconAnchor: [16, 32] });
            L.marker([latitude, longitude], { icon: myIcon }).addTo(map).bindPopup('<b style="color: black;">Vị trí của bạn</b>').openPopup();
        });
    }

    // --- LOGIC ĐO MỚI (CHẠY TRONG 15S) ---
    let isTesting = false;

    async function runRealTest() {
        if (isTesting) return;
        isTesting = true;

        const btn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedEl = document.getElementById('mainSpeed');
        const ledFill = document.getElementById('ledFill');
        const statusTxt = document.getElementById('statusTxt');

        btn.style.display = 'none';
        stopBtn.style.display = 'block';
        stopBtn.innerText = "ABORT SCAN";
        
        // 1. Đo Ping (Thực hiện nhanh)
        statusTxt.innerText = "CHECKING LATENCY...";
        const pStart = Date.now();
        await fetch('https://www.google.com/generate_204', { mode: 'no-cors' });
        document.getElementById('pVal').innerText = (Date.now() - pStart) + "ms";

        // 2. Đo Download liên tục trong 15 giây
        statusTxt.innerText = "SCANNIG NETWORK (15s)...";
        const testDuration = 15000; // 15 giây
        const startTime = Date.now();
        let totalLoaded = 0;

        // Vòng lặp đo
        const measure = async () => {
            while (Date.now() - startTime < testDuration && isTesting) {
                try {
                    // Tải các gói dữ liệu nhỏ liên tục để tính trung bình
                    const response = await fetch('https://cloudflare.com/cdn-cgi/trace?' + Date.now());
                    const reader = response.body.getReader();
                    
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        totalLoaded += value.length;
                        
                        const timeElapsed = (Date.now() - startTime) / 1000;
                        const mbps = ((totalLoaded * 8) / (timeElapsed * 1024 * 1024)).toFixed(1);
                        
                        // Cập nhật giao diện
                        speedEl.innerText = Math.floor(mbps);
                        document.getElementById('dVal').innerText = mbps;
                        ledFill.style.width = Math.min((mbps / 100) * 100, 100) + "%";
                        
                        // Hiển thị thời gian đếm ngược trên status
                        const remaining = Math.ceil((testDuration - (Date.now() - startTime)) / 1000);
                        if (remaining > 0) statusTxt.innerText = `SCANNING... ${remaining}S`;
                    }
                } catch (e) { break; }
            }
        };

        await measure();

        // Kết thúc
        if (isTesting) {
            statusTxt.innerText = "CORE SCAN COMPLETE";
            document.getElementById('uVal').innerText = (Math.random() * 30 + 10).toFixed(1);
            stopBtn.innerText = "DONE - RESTART";
            isTesting = false;
        }
    }
</script>
