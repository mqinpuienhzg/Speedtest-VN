<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSpeed - Infinity Scan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050810; --card-bg: #0c1221;
            --primary: #00f2fe; --secondary: #00ff88;
            --danger: #ff4757; --text-main: #ffffff; --border: #1a2c42;
        }
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0; padding: 15px;
        }
        .cyber-card {
            width: 100%; max-width: 380px; background: var(--card-bg);
            border-radius: 20px; padding: 25px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }
        #map { width: 100%; height: 150px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--primary); }
        .gauge {
            width: 100%; height: 140px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 10px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 20px;
        }
        .speed-value { font-size: 4.5rem; font-weight: 900; color: var(--text-main); line-height: 1; }
        .led-bar {
            position: absolute; bottom: 0; left: 0; width: 0%; height: 5px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            box-shadow: 0 0 15px var(--primary); transition: 0.1s;
        }
        .results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .res-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .res-box div:first-child { font-size: 0.6rem; color: #8b9bb4; text-transform: uppercase; }
        .btn {
            width: 100%; padding: 18px; font-family: inherit; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            background: var(--secondary); color: #000; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #stopBtn { background: var(--danger); color: #fff; display: none; }
    </style>
</head>
<body>

<div class="cyber-card">
    <h2 style="color: var(--primary); margin-bottom: 15px; font-size: 1.1rem;">INFINITY CORE SCANNER</h2>
    <div id="map"></div>
    <div class="gauge">
        <div id="status" style="font-size: 0.7rem; color: var(--primary); margin-bottom: 5px;">READY</div>
        <div class="speed-value" id="speed">0</div>
        <div style="font-size: 0.8rem; color: #8b9bb4;">MBPS</div>
        <div class="led-bar" id="bar"></div>
    </div>
    <div class="results">
        <div class="res-box"><div>Ping</div><div id="ping" style="color:var(--danger)">--</div></div>
        <div class="res-box"><div>Down</div><div id="down" style="color:var(--secondary)">--</div></div>
        <div class="res-box"><div>Elapsed</div><div id="time" style="color:var(--primary)">0m</div></div>
    </div>
    <button class="btn" id="startBtn" onclick="startInfinityScan()">Start 60m Test</button>
    <button class="btn" id="stopBtn" onclick="stopScan()">Emergency Stop</button>
</div>

<script>
    const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([10.7626, 106.6601], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let isScanning = false;
    let totalBytes = 0;
    let startTime;

    async function startInfinityScan() {
        isScanning = true;
        startTime = Date.now();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        
        // Đo Ping ban đầu
        const pStart = Date.now();
        try { await fetch('https://www.google.com/generate_204', { mode: 'no-cors' }); } catch(e){}
        document.getElementById('ping').innerText = (Date.now() - pStart) + "ms";

        updateLoop();
        downloadLoop();
    }

    function stopScan() {
        isScanning = false;
        location.reload();
    }

    function updateLoop() {
        if (!isScanning) return;
        const elapsed = (Date.now() - startTime) / 1000;
        const mbps = ((totalBytes * 8) / (elapsed * 1024 * 1024)).toFixed(1);
        
        document.getElementById('speed').innerText = Math.floor(mbps);
        document.getElementById('down').innerText = mbps;
        document.getElementById('bar').style.width = Math.min((mbps / 100) * 100, 100) + "%";
        document.getElementById('time').innerText = Math.floor(elapsed / 60) + "m " + Math.floor(elapsed % 60) + "s";
        document.getElementById('status').innerText = "CORE SCANNING ACTIVE...";

        if (elapsed < 3600) requestAnimationFrame(updateLoop); // Chạy tối đa 60 phút
        else stopScan();
    }

    async function downloadLoop() {
        while (isScanning) {
            try {
                const response = await fetch('https://cloudflare.com/cdn-cgi/trace?p=' + Date.now(), { cache: 'no-store' });
                const reader = response.body.getReader();
                while (true) {
                    const {done, value} = await reader.read();
                    if (done || !isScanning) break;
                    totalBytes += value.length;
                }
            } catch(e) { 
                await new Promise(r => setTimeout(r, 1000)); // Nghỉ 1s nếu lỗi mạng
            }
        }
    }
</script>
</body>
</html>
