<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speedtest - Mobile Optimized</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        /* Reset toàn bộ box-model để chống tràn viền trên Android */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt viền xanh khi chạm trên Android */
        }
        
        :root {
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --bg-body: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=2500&auto=format&fit=crop') center/cover no-repeat fixed;
            --card-bg: rgba(255, 255, 255, 0.85); 
            --card-border: rgba(255, 255, 255, 0.4);
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.08);
            --accent: #0071e3; 
            --accent-hover: #0077ed;
            --btn-text: #ffffff;
            --inner-card: rgba(0, 0, 0, 0.03);
            --map-border: rgba(0, 0, 0, 0.08);
            --chart-grid: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --card-bg: rgba(28, 28, 30, 0.85); 
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.5);
            --accent: #0a84ff; 
            --accent-hover: #409cff;
            --inner-card: rgba(255, 255, 255, 0.05);
            --map-border: rgba(255, 255, 255, 0.1);
            --chart-grid: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg-body); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            /* Dùng dvh thay vì vh để khít với thanh điều hướng Android */
            min-height: 100dvh; 
            margin: 0; padding: 15px; 
            transition: color 0.4s; overflow-x: hidden; 
        }
        
        .apple-panel { 
            background: var(--card-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); 
            width: 100%; max-width: 420px; border-radius: 32px; padding: 25px 20px; 
            box-shadow: var(--shadow-soft); border: 1px solid var(--glass-border); 
            position: relative; transition: all 0.4s ease; z-index: 2; 
        }

        h2 { text-align: center; margin: 0 0 20px 0; font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }

        .header-row { display: flex; align-items: stretch; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        
        .info-panel { flex: 1; background: var(--inner-card); border-radius: 22px; padding: 15px; display: flex; flex-direction: column; justify-content: center; transition: 0.4s; min-width: 0; /* Ép không tràn chữ */ }
        .info-row { display: flex; flex-direction: column; margin-bottom: 10px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: var(--text-muted); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .info-val { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #map { width: 85px; height: 85px; border-radius: 20px; border: 1px solid var(--glass-border); z-index: 10; flex-shrink: 0; background: #e5e5e5; }
        .leaflet-control-attribution { display: none !important; }

        .custom-map-icon { position: relative; }
        .radar-center { width: 14px; height: 14px; background-color: var(--accent); border-radius: 50%; position: absolute; top: -7px; left: -7px; border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 2; }
        .radar-ring { width: 32px; height: 32px; border-radius: 50%; background-color: var(--accent); position: absolute; top: -16px; left: -16px; animation: pulse 2s infinite ease-out; opacity: 0; z-index: 1; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 0.5; } 100% { transform: scale(2.2); opacity: 0; } }

        .top-stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .mini-box { flex: 1; background: var(--inner-card); padding: 15px 10px; border-radius: 22px; text-align: center; transition: 0.4s; }
        .mini-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .mini-val { font-size: 1.4rem; font-weight: 700; margin-top: 5px; color: var(--text-main); letter-spacing: -0.5px; }
        .unit { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }

        .speed-zone { background: var(--inner-card); border-radius: 24px; padding: 25px 15px; margin-bottom: 20px; text-align: center; transition: 0.4s; }
        .zone-title { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .speed-display { display: flex; justify-content: center; align-items: baseline; gap: 6px; margin-bottom: 5px; }
        .speed-mbps { font-size: 4.5rem; font-weight: 700; letter-spacing: -2px; line-height: 1; color: var(--text-main); transition: color 0.3s; }
        .speed-unit { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); }
        .active-zone .speed-mbps { color: var(--accent); }
        
        .speed-mbs { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; border-top: 1px solid var(--glass-border); padding-top: 10px; margin-top: 5px; }

        #status-txt { text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 15px; height: 15px; }
        
        button.main-btn { background: var(--accent); color: #fff; border: none; padding: 16px; font-size: 1.1rem; font-weight: 600; border-radius: 20px; cursor: pointer; width: 100%; transition: all 0.2s ease; letter-spacing: 0.5px; }
        button.main-btn:hover { filter: brightness(1.1); transform: scale(0.98); }

        .settings-btn { 
            position: fixed; top: 15px; right: 15px; 
            width: 40px; height: 40px; border-radius: 50%; 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; color: var(--text-main); 
            box-shadow: var(--shadow-soft); border: 1px solid var(--card-border);
            transition: 0.3s; z-index: 100; 
        }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); padding: 25px; border-radius: 28px; border: 1px solid var(--glass-border); width: 90%; max-width: 380px; box-shadow: var(--shadow-soft); transform: translateY(40px) scale(0.95); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.show .modal-content { transform: translateY(0) scale(1); }
        
        .modal-content h3 { margin-top: 0; text-align: center; color: var(--text-main); font-weight: 700; font-size: 1.1rem; }
        
        .result-stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .res-box { flex: 1; background: var(--inner-bg); padding: 12px; border-radius: 20px; text-align: center; }
        .res-val { font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -1px; }
        .res-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }

        .chart-container { width: 100%; height: 160px; margin: 15px 0; padding: 5px; }
        
        .set-group { margin-bottom: 15px; }
        .set-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; color: var(--text-muted); }
        .set-group select { width: 100%; padding: 12px; border-radius: 14px; background: var(--inner-bg); color: var(--text-main); border: 1px solid var(--glass-border); font-family: inherit; font-size: 0.95rem; outline: none; appearance: none; }
        
        .modal-btn { background: var(--inner-bg); color: var(--accent); border: none; padding: 15px; width: 100%; border-radius: 18px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.2s; }
        .modal-btn:hover { filter: brightness(0.9); }

        .click-ripple { position: fixed; border-radius: 50%; border: 2px solid var(--accent); transform: translate(-50%, -50%); animation: rippleEffect 0.6s ease-out forwards; pointer-events: none; z-index: 9999; box-shadow: 0 0 10px var(--accent); }
        @keyframes rippleEffect { 0% { width: 0px; height: 0px; opacity: 1; border-width: 3px; } 100% { width: 120px; height: 120px; opacity: 0; border-width: 0px; } }

        /* ĐIỀU CHỈNH RIÊNG CHO MÀN HÌNH NHỎ (Điện thoại Android hẹp) */
        @media (max-width: 380px) {
            .apple-panel { padding: 20px 15px; border-radius: 24px; }
            .speed-mbps { font-size: 3.8rem; }
            #map { width: 75px; height: 75px; }
            .mini-val { font-size: 1.2rem; }
            .info-val { font-size: 0.9rem; }
            button.main-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<audio id="myAudio" loop preload="auto">
    <source src="loilam.mp3" type="audio/mpeg">
</audio>

<div class="settings-btn" onclick="toggleModal('set-modal')">⚙️</div>

<div class="modal-overlay" id="set-modal">
    <div class="modal-content">
        <h3 id="set-title">Cài đặt</h3>
        <div class="set-group">
            <label id="lbl-duration">Thời gian đo:</label>
            <select id="sel-duration">
                <option value="15">Mặc định (15 giây)</option>
                <option value="60">1 Phút</option>
                <option value="300">5 Phút</option>
                <option value="900">15 Phút</option>
                <option value="1800">30 Phút</option>
            </select>
        </div>
        <div class="set-group">
            <label id="lbl-theme">Giao diện:</label>
            <select id="sel-theme" onchange="applyTheme()">
                <option value="light">Sáng (Mặc định)</option>
                <option value="dark">Tối (Dark Mode)</option>
            </select>
        </div>
        <div class="set-group">
            <label id="lbl-lang">Ngôn ngữ:</label>
            <select id="sel-lang" onchange="applyLanguage()">
                <option value="vi">Tiếng Việt</option>
                <option value="en">English</option>
            </select>
        </div>
        <button class="modal-btn" onclick="toggleModal('set-modal')" id="btn-close-set">Lưu & Đóng</button>
    </div>
</div>

<div class="modal-overlay" id="result-modal">
    <div class="modal-content">
        <h3 id="res-title">Báo Cáo Phân Tích</h3>
        
        <div class="result-stats">
            <div class="res-box">
                <div class="res-lbl" id="res-lbl-avg">Trung bình</div>
                <div class="res-val"><span id="res-avg">0</span><span class="unit"> Mbps</span></div>
            </div>
            <div class="res-box">
                <div class="res-lbl" id="res-lbl-data">Tổng tải</div>
                <div class="res-val"><span id="res-data">0</span><span class="unit"> GB</span></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="speedChart"></canvas>
        </div>

        <button class="modal-btn" onclick="toggleModal('result-modal')" id="btn-close-res">Xong</button>
    </div>
</div>

<div class="apple-panel">
    <h2 id="app-title">SPEEDTEST</h2>
    
    <div class="header-row">
        <div class="info-panel">
            <div class="info-row">
                <span class="info-label" id="lbl-loc">Vị trí</span>
                <span class="info-val" id="loc-val">Cấp quyền GPS...</span>
            </div>
            <div class="info-row">
                <span class="info-label" id="lbl-isp">Nhà mạng</span>
                <span class="info-val" id="isp-val">Đang quét...</span>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <div class="top-stats">
        <div class="mini-box">
            <div class="mini-label">Ping</div>
            <div class="mini-val"><span id="ping-val">--</span><span class="unit"> ms</span></div>
        </div>
        <div class="mini-box">
            <div class="mini-label">Jitter</div>
            <div class="mini-val"><span id="jitter-val">--</span><span class="unit"> ms</span></div>
        </div>
    </div>

    <div class="speed-zone" id="zone-dl">
        <div class="zone-title" id="lbl-dl">Download</div>
        <div class="speed-display">
            <div class="speed-mbps" id="dl-mbps">0</div>
            <div class="speed-unit">Mbps</div>
        </div>
        <div class="speed-mbs"><span id="dl-mbs">0.00</span> <span class="unit">MB/s</span></div>
    </div>

    <div id="status-txt">Sẵn sàng</div>
    <button class="main-btn" id="btn" onclick="startFullSequence()">Bắt đầu đo</button>
</div>

<script>
    document.addEventListener('click', function(e) {
        if(e.target.closest('.modal-overlay') || e.target.closest('.leaflet-container') || e.target.closest('.settings-btn')) return;
        let ripple = document.createElement('div');
        ripple.className = 'click-ripple';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    });

    const i18n = {
        vi: {
            appTitle: "SPEEDTEST", loc: "Vị trí", isp: "Nhà mạng", dl: "Download",
            ready: "Sẵn sàng", pinging: "Đang kiểm tra độ trễ...", testing: "Đang phân tích mạng...",
            done: "Hoàn tất", stopped: "Đã dừng", startBtn: "Bắt đầu đo", stopBtn: "Dừng lại", retryBtn: "Đo lại",
            locDef: "Cấp quyền GPS...", ispDef: "Đang quét...", Unknown: "Không rõ",
            setTitle: "Cài đặt", lblDur: "Thời gian đo:", lblTheme: "Giao diện:", lblLang: "Ngôn ngữ:",
            btnCloseSet: "Lưu & Đóng", durDef: "Mặc định (15 giây)", dur1m: "1 Phút", dur5m: "5 Phút", dur15m: "15 Phút", dur30m: "30 Phút",
            themeLight: "Sáng (Mặc định)", themeDark: "Tối (Dark Mode)",
            resTitle: "Báo Cáo Phân Tích", resAvg: "Trung bình", resData: "Tổng tải", btnCloseRes: "Xong"
        },
        en: {
            appTitle: "SPEEDTEST", loc: "Location", isp: "Provider", dl: "Download",
            ready: "Ready", pinging: "Measuring latency...", testing: "Analyzing network...",
            done: "Complete", stopped: "Stopped", startBtn: "Start Test", stopBtn: "Stop", retryBtn: "Test Again",
            locDef: "Allow GPS...", ispDef: "Scanning...", Unknown: "Unknown",
            setTitle: "Settings", lblDur: "Duration:", lblTheme: "Theme:", lblLang: "Language:",
            btnCloseSet: "Save", durDef: "Default (15s)", dur1m: "1 Minute", dur5m: "5 Minutes", dur15m: "15 Minutes", dur30m: "30 Minutes",
            themeLight: "Light Mode", themeDark: "Dark Mode",
            resTitle: "Analysis Report", resAvg: "Average", resData: "Total Data", btnCloseRes: "Done"
        }
    };
    
    let currentLang = 'vi';

    function applyLanguage() {
        currentLang = document.getElementById('sel-lang').value; const t = i18n[currentLang];
        document.getElementById('app-title').innerText = t.appTitle;
        document.getElementById('lbl-loc').innerText = t.loc; document.getElementById('lbl-isp').innerText = t.isp;
        document.getElementById('lbl-dl').innerText = t.dl;
        if(!isTesting) {
            document.getElementById('status-txt').innerText = t.ready;
            const btnText = document.getElementById('btn').innerText;
            if (btnText.includes("Bắt đầu") || btnText.includes("Start")) document.getElementById('btn').innerText = t.startBtn;
            else if (btnText.includes("Đo lại") || btnText.includes("Again")) document.getElementById('btn').innerText = t.retryBtn;
        }
        if(document.getElementById('loc-val').innerText.includes("Cấp") || document.getElementById('loc-val').innerText.includes("Allow")) document.getElementById('loc-val').innerText = t.locDef;
        if(document.getElementById('isp-val').innerText.includes("Đang") || document.getElementById('isp-val').innerText.includes("Scan")) document.getElementById('isp-val').innerText = t.ispDef;
        
        document.getElementById('set-title').innerText = t.setTitle; document.getElementById('lbl-duration').innerText = t.lblDur; 
        document.getElementById('lbl-theme').innerText = t.lblTheme; document.getElementById('lbl-lang').innerText = t.lblLang;
        document.getElementById('btn-close-set').innerText = t.btnCloseSet;
        
        document.getElementById('res-title').innerText = t.resTitle; document.getElementById('res-lbl-avg').innerText = t.resAvg; 
        document.getElementById('res-lbl-data').innerText = t.resData; document.getElementById('btn-close-res').innerText = t.btnCloseRes;

        const durOpts = document.getElementById('sel-duration').options; durOpts[0].text = t.durDef; durOpts[1].text = t.dur1m; durOpts[2].text = t.dur5m; durOpts[3].text = t.dur15m; durOpts[4].text = t.dur30m;
        const themeOpts = document.getElementById('sel-theme').options; themeOpts[0].text = t.themeLight; themeOpts[1].text = t.themeDark;
        
        if(speedChartInstance) { speedChartInstance.update(); }
    }

    const lightMapUrl = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    const darkMapUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    let currentTileLayer;

    function applyTheme() {
        let theme = document.getElementById('sel-theme').value;
        if (theme === 'dark') {
            document.body.classList.add('dark-theme');
            map.removeLayer(currentTileLayer); currentTileLayer = L.tileLayer(darkMapUrl).addTo(map);
        } else {
            document.body.classList.remove('dark-theme');
            map.removeLayer(currentTileLayer); currentTileLayer = L.tileLayer(lightMapUrl).addTo(map);
        }
        if(speedChartInstance) { drawResultBoard(); } 
    }

    function toggleModal(modalId) { document.getElementById(modalId).classList.toggle('show'); }

    let isTesting = false, phase = '', activeXhrs = [], totalBytes = 0, lastBytes = 0, lastTime = 0, speedHistory = [], fullChartData = [], uiFrame, map, userMarker;
    let speedChartInstance = null; 

    const radarIcon = L.divIcon({ className: 'custom-map-icon', html: '<div class="radar-ring"></div><div class="radar-center"></div>', iconSize: [0, 0] });

    window.onload = function() {
        applyLanguage();
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([16.0, 108.0], 5);
        currentTileLayer = L.tileLayer(lightMapUrl).addTo(map);

        fetch('https://get.geojs.io/v1/ip/geo.json').then(res => res.json()).then(data => {
            document.getElementById('isp-val').innerText = data.organization_name || data.organization || i18n[currentLang].Unknown;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        let lat = position.coords.latitude, lon = position.coords.longitude;
                        updateMap(lat, lon);
                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                            .then(res => res.json()).then(geoData => {
                                let city = geoData.address.city || geoData.address.town || geoData.address.state || i18n[currentLang].Unknown;
                                document.getElementById('loc-val').innerText = `${city}, ${geoData.address.country_code ? geoData.address.country_code.toUpperCase() : ''}`;
                            }).catch(() => fallbackIPLocation(data)); 
                    },
                    (error) => fallbackIPLocation(data),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else fallbackIPLocation(data);
        }).catch(e => {
            document.getElementById('loc-val').innerText = i18n[currentLang].Unknown; document.getElementById('isp-val').innerText = i18n[currentLang].Unknown;
        });
    };

    function updateMap(lat, lon) { map.setView([lat, lon], 14); if (userMarker) map.removeLayer(userMarker); userMarker = L.marker([lat, lon], { icon: radarIcon }).addTo(map); }
    function fallbackIPLocation(data) { const t = i18n[currentLang]; let city = data.city || t.Unknown, country = data.country || ""; document.getElementById('loc-val').innerText = `${city}${country ? ', ' + country : ''}`; if (data.latitude && data.longitude) updateMap(parseFloat(data.latitude), parseFloat(data.longitude)); }

    function resetUI() {
        document.getElementById('dl-mbps').innerText = "0"; document.getElementById('dl-mbs').innerText = "0.00";
        document.getElementById('ping-val').innerText = "--"; document.getElementById('jitter-val').innerText = "--";
        document.getElementById('zone-dl').classList.remove('active-zone');
        document.getElementById('status-txt').innerText = i18n[currentLang].ready;
    }

    function startUI() {
        lastTime = Date.now(); lastBytes = totalBytes; speedHistory = []; fullChartData = [];
        const loop = () => {
            if (!isTesting || phase === 'ping') return;
            let now = Date.now(), deltaT = (now - lastTime) / 1000;
            if (deltaT >= 0.25) {
                let deltaBytes = totalBytes - lastBytes, currentMBs = deltaBytes / (deltaT * 1024 * 1024), currentMbps = currentMBs * 8;
                speedHistory.push({ mbps: currentMbps, mbs: currentMBs });
                if (speedHistory.length > 5) speedHistory.shift();
                
                let avgMbps = speedHistory.reduce((a, b) => a + b.mbps, 0) / speedHistory.length;
                let avgMBs = speedHistory.reduce((a, b) => a + b.mbs, 0) / speedHistory.length;
                
                let displayMbps = Math.max(0, avgMbps).toFixed(0);
                document.getElementById('dl-mbps').innerText = displayMbps;
                document.getElementById('dl-mbs').innerText = Math.max(0, avgMBs).toFixed(2);
                
                fullChartData.push(parseFloat(displayMbps));
                lastBytes = totalBytes; lastTime = now;
            }
            uiFrame = requestAnimationFrame(loop);
        };
        uiFrame = requestAnimationFrame(loop);
    }

    function drawResultBoard() {
        if(fullChartData.length === 0) return;

        let totalDownloadedGB = (totalBytes / (1024 * 1024 * 1024)).toFixed(3);
        let averageSpeed = (fullChartData.reduce((a, b) => a + b, 0) / fullChartData.length).toFixed(0);
        
        document.getElementById('res-avg').innerText = averageSpeed;
        document.getElementById('res-data').innerText = totalDownloadedGB;

        if (speedChartInstance) { speedChartInstance.destroy(); }

        const ctx = document.getElementById('speedChart').getContext('2d');
        
        let isDark = document.body.classList.contains('dark-theme');
        let accentColor = isDark ? '#0A84FF' : '#007AFF';
        let gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
        let textColor = isDark ? '#a1a1a6' : '#86868b';

        let gradient = ctx.createLinearGradient(0, 0, 0, 150);
        gradient.addColorStop(0, isDark ? 'rgba(10, 132, 255, 0.4)' : 'rgba(0, 122, 255, 0.3)');
        gradient.addColorStop(1, 'rgba(10, 132, 255, 0)');

        let labels = fullChartData.map((_, i) => i); 

        speedChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: fullChartData,
                    borderColor: accentColor,
                    backgroundColor: gradient,
                    borderWidth: 3, 
                    pointRadius: 0, 
                    fill: true,
                    tension: 0.4 
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { display: false }, 
                    y: { 
                        beginAtZero: true,
                        grid: { color: gridColor, drawBorder: false },
                        ticks: { color: textColor, maxTicksLimit: 5, font: { family: '-apple-system, sans-serif', size: 10, weight: 500 } }
                    }
                },
                animation: { duration: 1200, easing: 'easeOutQuart' }
            }
        });

        toggleModal('result-modal');
    }

    async function startFullSequence() {
        const musicPlayer = document.getElementById('myAudio');
        const t = i18n[currentLang];
        const testDurationMS = parseInt(document.getElementById('sel-duration').value) * 1000; 

        if (isTesting) {
            isTesting = false; activeXhrs.forEach(xhr => xhr.abort()); activeXhrs = [];
            cancelAnimationFrame(uiFrame);
            musicPlayer.pause(); musicPlayer.currentTime = 0; 
            document.getElementById('status-txt').innerText = t.stopped;
            document.getElementById('btn').innerText = t.retryBtn;
            return;
        }

        isTesting = true;
        musicPlayer.play().catch(e => console.log("Cần chạm màn hình để phát nhạc"));
        resetUI();
        document.getElementById('btn').innerText = t.stopBtn;
        
        phase = 'ping';
        document.getElementById('status-txt').innerText = t.pinging;
        await measurePing(3000);
        if (!isTesting) return;

        phase = 'dl'; totalBytes = 0; 
        document.getElementById('status-txt').innerText = t.testing;
        document.getElementById('zone-dl').classList.add('active-zone');
        startUI();
        
        await measureBandwidth(testDurationMS); 
        
        cancelAnimationFrame(uiFrame);
        document.getElementById('zone-dl').classList.remove('active-zone');

        if (isTesting) { 
            isTesting = false;
            document.getElementById('status-txt').innerText = t.done;
            document.getElementById('btn').innerText = t.retryBtn;
            drawResultBoard(); 
        }
    }

    async function measurePing(duration) {
        let startTime = Date.now(), pings = [];
        while (Date.now() - startTime < duration && isTesting) {
            let pStart = Date.now();
            try {
                await fetch('https://cloudflare.com/cdn-cgi/trace?r=' + Math.random(), { cache: 'no-store' });
                let ping = Date.now() - pStart; pings.push(ping);
                document.getElementById('ping-val').innerText = ping;
                if (pings.length > 1) document.getElementById('jitter-val').innerText = Math.abs(pings[pings.length - 1] - pings[pings.length - 2]);
            } catch (e) {}
            await new Promise(r => setTimeout(r, 400));
        }
    }

    function measureBandwidth(duration) {
        return new Promise((resolve) => {
            let startTime = Date.now(), activeThreads = 0, maxThreads = 4;
            function nextChunk() {
                if (!isTesting || Date.now() - startTime >= duration) { if (activeThreads === 0) resolve(); return; }
                activeThreads++; let xhr = new XMLHttpRequest(); activeXhrs.push(xhr);
                xhr.open('GET', "https://speed.cloudflare.com/__down?bytes=25000000&r=" + Math.random(), true);
                let chunkLoaded = 0;
                xhr.onprogress = (e) => { if (!isTesting) return; totalBytes += (e.loaded - chunkLoaded); chunkLoaded = e.loaded; };
                xhr.send();
                xhr.onload = xhr.onerror = xhr.onabort = () => { 
                    activeThreads--; let idx = activeXhrs.indexOf(xhr); if(idx > -1) activeXhrs.splice(idx, 1);
                    nextChunk(); 
                };
            }
            for(let i = 0; i < maxThreads; i++) nextChunk();
        });
    }
</script>
