<script>
    let isTesting = false;
    let isPaused = false;
    let testInterval;
    const speedEl = document.getElementById('mainSpeed');
    const ledFill = document.getElementById('ledFill');
    const statusTxt = document.getElementById('statusTxt');

    async function runTest() {
        if(isTesting) return;
        isTesting = true;
        isPaused = false;
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';
        
        statusTxt.innerText = "MEASURING REAL SPEED...";

        // 1. Đo Ping thật
        const pStart = Date.now();
        await fetch('https://www.google.com/generate_204', { mode: 'no-cors' });
        const ping = Date.now() - pStart;
        document.getElementById('pVal').innerText = ping;

        // 2. Đo Download thật (Tải 1 file mẫu từ Cloudflare)
        const downloadUrl = 'https://cloudflare.com/cdn-cgi/trace?' + Date.now();
        const dStart = Date.now();
        
        try {
            const response = await fetch(downloadUrl, { cache: 'no-store' });
            const reader = response.body.getReader();
            let receivedLength = 0;

            while(true) {
                if (isPaused) { await new Promise(r => setTimeout(r, 100)); continue; }
                if (!isTesting) break;

                const {done, value} = await reader.read();
                if (done) break;
                
                receivedLength += value.length;
                const duration = (Date.now() - dStart) / 1000;
                // Công thức tính Mbps thật: (Dữ liệu / Thời gian) * 8 bit
                const bps = (receivedLength / duration) * 8;
                const mbps = (bps / 1024 / 1024).toFixed(1);
                
                speedEl.innerText = Math.floor(mbps);
                document.getElementById('dVal').innerText = mbps;
                ledFill.style.width = Math.min((mbps / 100) * 100, 100) + "%";
            }
        } catch (e) {
            console.error("Lỗi đo:", e);
        }

        statusTxt.innerText = "SCAN COMPLETE";
        isTesting = false;
    }

    // Các hàm Pause và Stop giữ nguyên logic điều khiển giao diện
    function togglePause() {
        isPaused = !isPaused;
        statusTxt.innerText = isPaused ? "SYSTEM PAUSED" : "SCANNING...";
        ledFill.classList.toggle('paused-led');
    }

    function stopTest() {
        isTesting = false;
        location.reload(); // Cách nhanh nhất để reset hệ thống thật
    }
</script>
