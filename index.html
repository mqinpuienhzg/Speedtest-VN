<script>
    let isTesting = false;
    let isPaused = false;
    let abortController; // Dùng để dừng việc tải dữ liệu thật

    const speedEl = document.getElementById('mainSpeed');
    const ledFill = document.getElementById('ledFill');
    const statusTxt = document.getElementById('statusTxt');

    async function runTest() {
        if (isTesting) return;
        isTesting = true;
        isPaused = false;
        abortController = new AbortController();

        // Cấu hình giao diện nút bấm
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';

        try {
            // --- BƯỚC 1: ĐO PING THẬT ---
            statusTxt.innerText = "CHECKING LATENCY...";
            const pStart = Date.now();
            await fetch('https://www.google.com/generate_204', { mode: 'no-cors' });
            const ping = Date.now() - pStart;
            document.getElementById('pingVal').innerText = ping;

            // --- BƯỚC 2: ĐO DOWNLOAD THẬT ---
            statusTxt.innerText = "MEASURING DOWNLOAD...";
            // Sử dụng file mẫu của Cloudflare (khoảng 25MB để đo chính xác)
            const downloadUrl = 'https://cloudflare.com/cdn-cgi/trace?' + Date.now(); 
            const dStart = Date.now();
            
            const response = await fetch(downloadUrl, { 
                signal: abortController.signal,
                cache: 'no-store' 
            });

            // Giả lập luồng dữ liệu để tính Mbps theo thời gian thực
            let receivedLength = 0;
            const reader = response.body.getReader();

            while(true) {
                if (isPaused) {
                    await new Promise(r => setTimeout(r, 100));
                    continue;
                }

                const {done, value} = await reader.read();
                if (done || !isTesting) break;

                receivedLength += value.length;
                const duration = (Date.now() - dStart) / 1000;
                
                // Công thức tính Mbps
                const mbps = ((receivedLength * 8) / (duration * 1024 * 1024)).toFixed(1);
                
                speedEl.innerText = Math.floor(mbps);
                document.getElementById('downVal').innerText = mbps;
                ledFill.style.width = Math.min((mbps / 200) * 100, 100) + "%";
            }

            statusTxt.innerText = "SCAN COMPLETE";
        } catch (err) {
            if (err.name === 'AbortError') {
                statusTxt.innerText = "TEST ABORTED";
            } else {
                statusTxt.innerText = "CONNECTION ERROR";
            }
        } finally {
            isTesting = false;
            resetUI();
        }
    }

    function togglePause() {
        isPaused = !isPaused;
        statusTxt.innerText = isPaused ? "SYSTEM PAUSED" : "SCANNING...";
        ledFill.classList.toggle('paused-led');
        document.getElementById('pauseBtn').innerText = isPaused ? "RESUME" : "PAUSE";
    }

    function stopTest() {
        isTesting = false;
        if (abortController) abortController.abort(); // Ngắt kết nối tải ngay lập tức
        resetUI();
    }

    function resetUI() {
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('startBtn').innerText = "RE-INITIALIZE";
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
    }
</script>
